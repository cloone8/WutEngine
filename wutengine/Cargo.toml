[package]
name = "wutengine"
description = "A modern game engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true
readme = "../README.md"

[features]
profiling = ["dep:puffin_http", "profiling/profile-with-puffin"]
asset_importers = ["wutengine_asset/importers"]

[lints]
workspace = true

[dependencies]
wutengine_util_macro.workspace = true
wutengine_shadercompiler.workspace = true
wutengine_asset.workspace = true

log.workspace = true
derive_more = { workspace = true, features = [
    "display",
    "error",
    "from",
    "debug",
    "is_variant",
    "unwrap",
    "try_unwrap",
] }
hecs.workspace = true
winit.workspace = true
wgpu = { workspace = true, features = [
    # Shader languages
    "naga-ir",

    # Backends
    "dx12",
    "vulkan",
    "metal",
    "webgpu",

    # Other features
    "std",
    "web",
    "parking_lot",
] }
nohash-hasher.workspace = true
pollster.workspace = true
image.workspace = true
profiling.workspace = true
smallvec.workspace = true
glam = { workspace = true, features = ["bytemuck", "serde"] }
twox-hash.workspace = true
dashmap = { workspace = true, features = ["rayon"] }
rayon.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_bytes.workspace = true
toml.workspace = true
bytemuck = { workspace = true, features = [
    "derive",
    "must_cast",
    "const_zeroed",
] }

# Optional dependencies
puffin_http = { workspace = true, optional = true } # Feature - profiling
