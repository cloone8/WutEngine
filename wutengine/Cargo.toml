[package]
name = "wutengine"
description = "A modern game engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true
readme = "../README.md"

[features]
profiling = [
    "dep:puffin_http",
    "profiling/profile-with-puffin",
    "wutengine_shadercompiler/profiling",
]

[lints]
workspace = true

[dependencies]
wutengine_util_macro.workspace = true
wutengine_shadercompiler.workspace = true

log.workspace = true
derive_more = { workspace = true, features = [
    "display",
    "error",
    "from",
    "debug",
    "is_variant",
    "unwrap",
    "try_unwrap",
] }
hecs.workspace = true
winit.workspace = true
wgpu = { workspace = true, features = [
    # Shader languages
    "naga-ir",

    # Backends
    "dx12",
    "vulkan",
    "metal",
    "webgpu",

    # Other features
    "std",
    "web",
    "parking_lot",
] }
nohash-hasher.workspace = true
pollster.workspace = true
image.workspace = true
profiling.workspace = true
smallvec.workspace = true
glam.workspace = true
twox-hash.workspace = true

# Optional dependencies
puffin_http = { workspace = true, optional = true } # Feature - profiling
