[package]
name = "wutengine_assets"
description = "Asset definitions for WutEngine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish = true

[features]
std = []
serialize = ["serde"]
deserialize = ["serde"]
serde = ["dep:serde", "dep:serde_bytes", "uuid/serde", "hashbrown/serde"]

[dependencies]
wutengine_util = { workspace = true, features = ["hashbrown"] }
wutengine_math.workspace = true
wutengine_util_macro.workspace = true

hashbrown = { workspace = true }
uuid = { workspace = true }
derive_more = { workspace = true, features = ["from", "display"] }
nohash-hasher.workspace = true

serde = { workspace = true, optional = true }
serde_bytes = { workspace = true, optional = true }

[lints]
workspace = true
