[package]
name = "wutengine_physics"
description = "Physics implementation for WutEngine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish = true

[features]
phys2d = ["dep:rapier2d"]
phys3d = ["dep:rapier3d"]

[dependencies]
wutengine_util.workspace = true
wutengine_util_macro.workspace = true
wutengine_math.workspace = true

log.workspace = true
profiling.workspace = true
nohash-hasher.workspace = true
derive_more = { workspace = true, features = ["debug"] }
rayon = { workspace = true }

rapier2d = { workspace = true, features = [
    "parallel",
    "simd-stable",
], optional = true }
rapier3d = { workspace = true, features = [
    "parallel",
    "simd-stable",
], optional = true }

[lints]
workspace = true
