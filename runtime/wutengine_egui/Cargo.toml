[package]
name = "wutengine_egui"
description = "egui intergration for WutEngine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish = true

[features]
default_fonts = ["egui/default_fonts"]

[dependencies]
wutengine_math = { workspace = true, features = ["std"] }
wutengine_assets = { workspace = true, features = ["std"] }
wutengine_input = { workspace = true, features = ["std"] }
wutengine_util = { workspace = true, features = ["std"] }
wutengine_graphics = { workspace = true, features = ["std"] }
wutengine_time = { workspace = true, features = ["std"] }
wutengine_shadercompiler = { workspace = true, features = ["std"] }

log.workspace = true
bytemuck.workspace = true
egui = { workspace = true, features = ["bytemuck"] }
serde_json.workspace = true
derive_more = { workspace = true, features = ["debug"] }
profiling.workspace = true
nohash-hasher.workspace = true
cursor-icon = { workspace = true }

[lints]
workspace = true
