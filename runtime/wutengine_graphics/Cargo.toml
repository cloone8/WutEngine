[package]
name = "wutengine_graphics"
description = "Graphics API for WutEngine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish = true

[features]
default = ["labels"]
std = [
    "wutengine_util/std",
    "wutengine_assets/std",
    "wutengine_asset_server/std",
    "wutengine_math/std",
    "wutengine_shadercompiler/std",
    "wutengine_config/std",
]
labels = []

[dependencies]
wutengine_util = { workspace = true, features = ["hashbrown"] }
wutengine_util_macro.workspace = true
wutengine_assets.workspace = true
wutengine_asset_server.workspace = true
wutengine_math.workspace = true
wutengine_shadercompiler.workspace = true
wutengine_config.workspace = true

hashbrown = { workspace = true }
log.workspace = true
profiling.workspace = true
smallvec.workspace = true
derive_more = { workspace = true, features = [
    "display",
    "from",
    "error",
    "unwrap",
    "try_unwrap",
    "is_variant",
] }
dirs = { workspace = true }
wgpu = { workspace = true, features = [
    # Shader languages
    "naga-ir",

    # Backends
    "dx12",
    "vulkan",
    "metal",
    "webgpu",

    # Other features
    "std",
    "web",
    "parking_lot",
] }
nohash-hasher.workspace = true
serde = { workspace = true, features = ["derive"] }
dashmap = { workspace = true, features = ["inline"] }
bytemuck = { workspace = true, features = [
    "derive",
    "must_cast",
    "const_zeroed",
] }
pollster.workspace = true
twox-hash = { workspace = true, features = ["std", "xxhash3_64"] }
image = { workspace = true, features = ["png"] }

[lints]
workspace = true
