[workspace]
resolver = "3"
members = ["wutengine", "wutengine_util_macro"]

[workspace.package]
version = "0.6.0"
edition = "2024"
rust-version = "1.88"
authors = ["Wouter de Bruijn <wouter@wutru.io>"]
homepage = "https://github.com/cloone8/WutEngine"
repository = "https://github.com/cloone8/WutEngine"
license = "MPL-2.0"
keywords = ["2D", "3D", "game", "engine"]
categories = ["game-engines"]

[workspace.dependencies]
### Workspace dependencies ###
wutengine = { path = "wutengine", version = "0.6.0" }
wutengine_util_macro = { path = "wutengine_util_macro", version = "0.6.0" }

### External dependencies ###
winit = { version = "0.30" }
wgpu = { version = "28", default-features = false }
hecs = { version = "0.11" }

rayon = { version = "1.11" }
pollster = { version = "0.4" }
smallvec = { version = "1", features = [
    "union",
    "const_generics",
    "const_new",
] }

profiling = { version = "1" }
puffin_http = { version = "0.16" }
log = { version = "0.4" }
glam = { version = "0.30", features = ["std", "debug-glam-assert"] }

derive_more = { version = "2" }
nohash-hasher = { version = "0.2" }

quote = { version = "1" }
syn = { version = "2", features = ["full"] }

image = { version = "0.25" }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"

[workspace.lints.rust]
# Groups
future_incompatible = { level = "warn", priority = -1 }
nonstandard_style = { level = "warn", priority = -1 }

# Individual lints
missing_docs = "warn"
unsafe_op_in_unsafe_fn = "warn"
unreachable_pub = "warn"
unused_crate_dependencies = "deny"

[workspace.lints.clippy]
cargo = { level = "warn", priority = -1 }
missing_assert_messages = "warn"
missing_docs_in_private_items = "warn"
missing_assert_message = "warn"
allow_attributes_without_reason = "warn"
std_instead_of_core = "warn"
too_many_lines = "warn"
unused_self = "warn"
mutex_integer = "warn"
large_stack_arrays = "warn"
large_types_passed_by_value = "warn"
borrow_as_ptr = "warn"
doc_broken_link = "warn"
empty_drop = "warn"
fallible_impl_from = "warn"
fn_params_excessive_bools = "warn"
infinite_loop = "warn"
verbose_file_reads = "warn"
unneeded_field_pattern = "warn"
unimplemented = "warn"
todo = "warn"
suspicious_operation_groupings = "warn"
needless_collect = "warn"
needless_pass_by_ref_mut = "warn"
needless_raw_strings = "warn"
mod_module_files = "deny"
