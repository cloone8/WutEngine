[workspace]
resolver = "3"
members = [
    "wutengine",
    "wutengine_asset",
    "wutengine_graphics",
    "wutengine_shadercompiler",
    "wutengine_util",
    "wutengine_util_macro",
    "wutengine_windowing",
    "wutengine_event",
    "wutengine_job",
    "wutengine_time",
    "wutengine_config",
    "wutengine_math",
    "wutengine_lua",
    "tools/weshc",
]

[workspace.package]
version = "0.6.0"
edition = "2024"
rust-version = "1.88"
authors = ["Wouter de Bruijn <wouter@wutru.io>"]
homepage = "https://github.com/cloone8/WutEngine"
repository = "https://github.com/cloone8/WutEngine"
license = "MPL-2.0"
keywords = []
categories = ["game-engines"]

[workspace.dependencies]
### Workspace dependencies ###
wutengine = { path = "wutengine", version = "0.6.0" }
wutengine_asset = { path = "wutengine_asset", version = "0.6.0" }
wutengine_event = { path = "wutengine_event", version = "0.6.0" }
wutengine_graphics = { path = "wutengine_graphics", version = "0.6.0" }
wutengine_windowing = { path = "wutengine_windowing", version = "0.6.0" }
wutengine_job = { path = "wutengine_job", version = "0.6.0" }
wutengine_util = { path = "wutengine_util", version = "0.6.0" }
wutengine_util_macro = { path = "wutengine_util_macro", version = "0.6.0" }
wutengine_shadercompiler = { path = "wutengine_shadercompiler", version = "0.6.0" }
wutengine_time = { path = "wutengine_time", version = "0.6.0" }
wutengine_config = { path = "wutengine_config", version = "0.6.0" }
wutengine_math = { path = "wutengine_math", version = "0.6.0" }
wutengine_lua = { path = "wutengine_lua", version = "0.6.0" }

### External dependencies ###
winit = { version = "0.30" }
wgpu = { version = "26.0.1", default-features = false, features = [
    "std",
    "parking_lot",
    "naga-ir",
] }
naga = { version = "26" }
hecs = { version = "0.10" }
mlua = { version = "0.11" }

rayon = { version = "1.10" }
itertools = { version = "0.14" }
pollster = { version = "0.4" }
arc-swap = { version = "1.7", features = ["serde"] }

profiling = { version = "1.0" }
puffin_http = { version = "0.16" }

log = { version = "0.4" }
simplelog = { version = "0.12" }
thiserror = { version = "2.0" }
glam = { version = "0.29", features = [
    "std",
    "debug-glam-assert",
    "bytemuck",
    "serde",
] }
serde = { version = "1.0", features = ["derive"] }
serde_bytes = { version = "0.11" }
serde_json = { version = "1.0" }
toml = { version = "0.9" }
postcard = { version = "1.1", features = ["use-std"] }
logos = "0.15"

cfg-if = { version = "1.0.1" }
derive_more = { version = "2" }

quote = { version = "1" }
syn = { version = "2", features = ["full"] }

nohash-hasher = { version = "0.2" }

image = { version = "0.25", features = [] }
bytemuck = { version = "1.23", features = ["extern_crate_alloc"] }
bitflags = { version = "2", features = ["std", "serde", "bytemuck"] }

clap = { version = "4.5", features = ["derive"] }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"

[workspace.lints.rust]
missing_docs = "warn"
unsafe_op_in_unsafe_fn = "warn"
unreachable_pub = "warn"

[workspace.lints.clippy]
missing_docs_in_private_items = "warn"
missing_assert_messages = "warn"
allow_attributes_without_reason = "warn"
std_instead_of_core = "warn"
cargo = "warn"
